# Alias of render.yaml — free tier, paths resolved automatically (no DATA_ROOT / DB_PATH required).

services:
  - type: web
    name: monm-api
    runtime: node
    region: oregon
    plan: free

    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/init-db.js && node src/index.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PWA_URL
        value: https://monm-secure-messaging.netlify.app
      - key: CORS_ORIGINS
        value: https://monm-secure-messaging.netlify.app
